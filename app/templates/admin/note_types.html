{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="mb-8">
        <div class="flex flex-col-reverse sm:flex-row sm:items-start sm:justify-between gap-4 mb-4">
            <h1 class="font-display text-4xl sm:text-5xl font-bold tracking-tight">
                <span class="bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
                    Manage Note Types
                </span>
            </h1>
            <a href="{{ url_for('admin.dashboard') }}" class="inline-flex items-center gap-2 font-mono text-sm text-gray-400 hover:text-purple-400 transition whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to Dashboard
            </a>
        </div>
    </div>
    
    <!-- Add Form -->
    <form method="POST" action="{{ url_for('admin.add_note_type') }}" class="glass p-6 rounded-2xl mb-8">
        <div class="flex flex-col sm:flex-row gap-4">
            <input type="text" name="name" placeholder="New note type name" required
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 font-mono focus:outline-none focus:border-purple-500 transition">
            <button type="submit" class="btn-magnetic glass px-8 py-3 rounded-xl font-mono font-semibold border-2 border-purple-500/50 hover:border-purple-400">
                Add
            </button>
        </div>
    </form>
    
    <!-- Note Types List (Desktop) -->
    <div class="glass rounded-2xl overflow-hidden hidden md:block">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-white/5 border-b border-white/10">
                    <tr>
                        <th class="px-6 py-4 text-left font-mono text-sm text-gray-400 whitespace-nowrap">ID</th>
                        <th class="px-6 py-4 text-left font-mono text-sm text-gray-400 whitespace-nowrap">Name</th>
                        <th class="px-6 py-4 text-right font-mono text-sm text-gray-400 whitespace-nowrap">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for note_type in note_types %}
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="px-6 py-4 font-mono text-sm whitespace-nowrap">{{ note_type.id }}</td>
                        <td class="px-6 py-4">
                            <form method="POST" action="{{ url_for('admin.update_note_type', id=note_type.id) }}" class="flex gap-2">
                                <input type="text" name="name" value="{{ note_type.name }}" required
                                    class="flex-1 min-w-[180px] bg-white/5 border border-white/10 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:border-purple-500 transition">
                                <button type="submit" class="px-3 py-2 bg-blue-500/20 border border-blue-500/50 rounded-lg font-mono text-xs hover:bg-blue-500/30 transition">
                                    Save
                                </button>
                            </form>
                        </td>
                        <td class="px-6 py-4 text-right whitespace-nowrap">
                            <form method="POST" action="{{ url_for('admin.delete_note_type', id=note_type.id) }}" class="inline">
                                <button type="submit" onclick="return confirm('Delete this note type?')" class="px-4 py-2 bg-red-500/20 border border-red-500/50 rounded-lg font-mono text-sm hover:bg-red-500/30 transition">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Note Types List (Mobile) -->
    <div class="space-y-3 md:hidden">
        {% for note_type in note_types %}
        <div class="glass rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
                <span class="font-mono text-xs text-gray-500">#{{ note_type.id }}</span>
            </div>
            <form method="POST" action="{{ url_for('admin.update_note_type', id=note_type.id) }}" class="space-y-3 mb-2">
                <input type="text" name="name" value="{{ note_type.name }}" required
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:border-purple-500 transition">
                <button type="submit" class="w-full px-3 py-2 bg-blue-500/20 border border-blue-500/50 rounded-lg font-mono text-xs hover:bg-blue-500/30 transition">
                    Save
                </button>
            </form>
            <form method="POST" action="{{ url_for('admin.delete_note_type', id=note_type.id) }}">
                <button type="submit" onclick="return confirm('Delete this note type?')" class="w-full px-3 py-2 bg-red-500/20 border border-red-500/50 rounded-lg font-mono text-xs hover:bg-red-500/30 transition">
                    Delete
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
